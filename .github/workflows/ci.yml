name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PortAudio (sounddevice backend)
        run: brew install portaudio

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Byte-compile all modules
        run: python -c "import py_compile, glob; [py_compile.compile(f, doraise=True) for f in glob.glob('engine/*.py')]"

      - name: Run unit tests
        run: python -m pytest tests/test_units.py -q
