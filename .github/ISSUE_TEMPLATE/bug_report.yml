name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report. The fields below are the ones needed to actually reproduce a macOS dictation bug — please fill them in."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
      placeholder: "I double-tapped fn and spoke, but nothing pasted…"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 15.1"
    validations:
      required: true
  - type: input
    id: chip
    attributes:
      label: Chip
      placeholder: "e.g. M3 Pro"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode / tier in use
      options: ["Clean + Accurate", "Clean + Fast", "Exact + Accurate", "Exact + Fast", "Not sure"]
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log output
      description: "Paste the relevant lines from `./simo log` (or `~/.simo-flow.log`). Redact anything private."
      render: text
    validations:
      required: false
